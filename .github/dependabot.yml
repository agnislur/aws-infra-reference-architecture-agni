version: 2
updates:
  # ─── Terraform Provider AWS (phase-01, phase-02, phase-03) ───────────────────
  - package-ecosystem: "terraform"
    directory: "/phase-01-monolithic-ha"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    groups:
      terraform-update:
          patterns:
            - "*"
    labels:
      - "dependencies"
      - "terraform"
      - "phase-01"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "terraform"
    directory: "/phase-02-modular-infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    groups:
      terraform-update:
          patterns:
            - "*"
    labels:
      - "dependencies"
      - "terraform"
      - "phase-02"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "terraform"
    directory: "/phase-03-app-and-pipeline"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    groups:
      terraform-update:
          patterns:
            - "*" 
    labels:
      - "dependencies"
      - "terraform"
      - "phase-03"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ─── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    groups:
      action-update:
          patterns:
            - "*"      
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
